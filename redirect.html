<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>正在跳转至机场官网... - JcTuijian</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://jctuijian.com/" />
  <link rel="stylesheet" href="assets/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230EA5E9'/><text y='22' x='5' font-size='20'>✈</text></svg>" />
</head>
<body>

<div class="redirect-page">
  <div class="redirect-box">
    <div class="redirect-spinner" id="spinner" aria-label="加载中"></div>
    <h1 class="redirect-title" id="redirect-title">正在跳转...</h1>
    <p class="redirect-desc" id="redirect-desc">即将前往机场官网，请稍候。</p>
    <div class="redirect-cta" id="redirect-cta">
      <a href="#" id="redirect-manual-link">点击此处手动跳转 →</a>
    </div>
  </div>
</div>

<script src="assets/data.js?v=202606282"></script>
<script>
/* ── 点击中转页核心逻辑 ── */
(async function () {
  const params    = new URLSearchParams(window.location.search);
  const airportId = params.get('id')      || '';
  let encodedUrl  = params.get('url')     || '';
  const from      = params.get('from')    || 'unknown';
  const charged   = params.get('charged') || '0';  // 1 = 计费成功, 0 = 防刷跳过

  // 从本地数据源查找默认的机场名称和URL作为首屏渲染及网络故障兜底
  const airports = window.AIRPORTS_DATA || [];
  const airport  = airports.find(a => a.id === airportId);
  let name       = airport ? airport.name : '目标机场';
  let targetUrl  = '';

  // 如果传入了 airportId，尝试从 Supabase 实时拉取该机场最新的官网链接
  if (airportId) {
    try {
      const resp = await fetch(
        `https://jsdvhryfmuadxaijmsjb.supabase.co/rest/v1/airports?select=name,website_url,affiliate_url&id=eq.${airportId}`,
        {
          headers: {
            'apikey':        'sb_publishable_ufJ4lt-JiL9ONh5X9X6ZHw_PE58RM1F',
            'Authorization': 'Bearer sb_publishable_ufJ4lt-JiL9ONh5X9X6ZHw_PE58RM1F',
          }
        }
      );
      if (resp.ok) {
        const rows = await resp.json();
        if (rows && rows.length > 0) {
          const dbRow = rows[0];
          name = dbRow.name || name;
          // 优先使用商户更新后的推广/官网链接
          const dbUrl = dbRow.affiliate_url || dbRow.website_url;
          if (dbUrl) {
            encodedUrl = dbUrl;
          }
        }
      }
    } catch (e) {
      console.warn('中转页实时拉取最新官网链接失败，将使用传入参数或静态兜底', e);
    }
  }

  // 解码目标 URL
  try {
    targetUrl = decodeURIComponent(encodedUrl);
  } catch (e) {
    targetUrl = encodedUrl;
  }

  // 如果 URL 为空，尝试使用数据源中的默认 URL
  if (!targetUrl && airport && airport.url) {
    targetUrl = airport.url;
  }

  // 校验基本合法性（只允许 http/https）
  if (!targetUrl || !/^https?:\/\//i.test(targetUrl)) {
    document.getElementById('redirect-title').textContent = '链接无效';
    document.getElementById('redirect-desc').textContent  = '跳转目标地址不合法，即将返回首页。';
    document.getElementById('spinner').style.display = 'none';
    setTimeout(() => { window.location.href = '/'; }, 2000);
    return;
  }

  // 更新页面文字
  document.getElementById('redirect-title').textContent =
    `正在跳转至 ${name} 官网...`;
  document.getElementById('redirect-desc').textContent =
    charged === '1'
      ? `本次跳转已计入有效点击统计。如未自动跳转，请点击下方按钮。`
      : `本次跳转（来源：${from}）。如未自动跳转，请点击下方按钮。`;

  // 设置手动跳转按钮链接
  const linkEl  = document.getElementById('redirect-manual-link');
  linkEl.href   = targetUrl;
  linkEl.setAttribute('target', '_self');
  linkEl.setAttribute('rel', 'noopener noreferrer');

  // 上报点击到后端（可选 - 生产阶段启用）
  // fetch('/api/v1/redirect-confirm', {
  //   method: 'POST',
  //   headers: { 'Content-Type': 'application/json' },
  //   body: JSON.stringify({ id: airportId, from, charged: charged === '1', ts: Date.now() }),
  //   keepalive: true,
  // }).catch(() => {});

  // 立即执行跳转（新 Tab 模式：window.open；同 Tab 模式：location.href）
  // 此处选择同 Tab 跳转，与"官网"按钮在新 Tab 打开不同
  setTimeout(() => {
    window.location.href = targetUrl;
  }, 800);

})();
</script>

</body>
</html>
